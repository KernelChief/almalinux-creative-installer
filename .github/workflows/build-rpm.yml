name: Build RPMs

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (EL10)
    runs-on: ubuntu-latest
    container:
      image: almalinux:10

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          # 1. Install EPEL and the plugins needed to enable CRB
          dnf -y install epel-release dnf-plugins-core

          # 2. Enable CRB (Necessary for PySide6/Qt6 dependencies)
          dnf config-manager --set-enabled crb

          # 3. Clean and install with strict CI flags
          dnf clean all
          BASE_PACKAGES=(
            rpm-build
            rpmdevtools
            python3
            python3-pip
            python3-devel
            gcc
            gcc-c++
            make
            qt6-qtbase
            qt6-qtbase-gui
            polkit
            xdg-utils
            git
            rsync
            tar
            findutils
          )

          dnf -y --nogpgcheck install \
            --setopt=install_weak_deps=False \
            "${BASE_PACKAGES[@]}"

          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade PySide6 pyside6-deploy

      - name: Build RPM
        env:
          TOPDIR: ${{ github.workspace }}/rpmbuild
          DISTDIR: ${{ github.workspace }}/dist
          VERSION_OVERRIDE: ${{ github.ref_name }}
        run: |
          mkdir -p "$TOPDIR" "$DISTDIR"
          # Ensure rpmbuild writes inside the shared workspace (not ~)
          export HOME="${{ github.workspace }}"
          mkdir -p "$HOME"/rpmbuild

          chmod +x src/packaging/build-rpm.sh
          ./src/packaging/build-rpm.sh

          # Collect RPMs into dist/
          find "$HOME/rpmbuild/RPMS" -type f -name "*.rpm" -exec cp -v {} "$DISTDIR/" \;

          VERSION_TAG="${VERSION_OVERRIDE#v}"
          ORIGINAL_RPM=$(ls -1 "${DISTDIR}"/*.rpm | head -n 1)
          RENAMED_RPM="${DISTDIR}/almalinux-creative-installer-x86_64.v${VERSION_TAG}.rpm"
          mv -v "${ORIGINAL_RPM}" "${RENAMED_RPM}"

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-el10
          path: dist/*.rpm

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpm-el10
          path: dist

      - name: List files (debug)
        run: |
          ls -lah dist
          echo "Found RPMs:"
          ls -lah dist/*.rpm || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.rpm
          generate_release_notes: false
          body: |
            ## :tada: AlmaLinux Creative Installer ${{ github.ref_name }}
            
            :white_check_mark: Highlights
            - (fill me in)
            
            :package: Assets
            - EL10 RPM