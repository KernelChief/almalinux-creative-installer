name: Build RPMs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 1.0.4 or v1.0.4). Leave empty to use main's latest tag."
        required: false
        default: ""
  push:
    tags:
      - "v*"
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'documentation')

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/almalinux-creative-installer src/qtcompat.py

  shellcheck:
    name: ShellCheck helper
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'documentation')

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: src/almalinux-creative-installer-helper

  build:
    name: Build (EL${{ matrix.el }})
    runs-on: ubuntu-latest
    needs: [lint, shellcheck]
    if: github.event.pull_request.draft != true && (github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'documentation'))
    strategy:
      matrix:
        include:
          - el: 9
            qt_pkg: python3-qt5
          - el: 10
            qt_pkg: python3-pyqt6

    container:
      image: almalinux:${{ matrix.el }}

    steps:
      - name: Install build dependencies
        run: |
          # EL10: enable CRB before EPEL so python3-pyqt6 is resolvable
          if [ "${{ matrix.el }}" -ge "10" ]; then
            dnf config-manager --enable crb
          fi
          dnf -y install epel-release
          dnf -y install \
            rpm-build rpmdevtools git bash \
            python3 \
            ${{ matrix.qt_pkg }} \
            polkit xdg-utils \
            rsync tar findutils

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve build version
        id: resolve_version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          # 1) workflow_dispatch explicit input wins
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Resolved version from workflow input: ${VERSION}"
            exit 0
          fi

          # 2) Tag pushes use tag name
          if [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Resolved version from tag: ${VERSION}"
            exit 0
          fi

          # 3) PR builds: beta pre-release of the NEXT version, numbered by the
          #    workflow run. Base = latest stable tag with the patch bumped by one
          #    (v2.0.1 -> 2.0.2), so betas sort ABOVE stable 2.0.1 and BELOW the
          #    eventual 2.0.2 final. github.run_number increases on every commit
          #    and every rebuild, so each build is a strictly-newer NVR. No
          #    hardcoded version; rolls forward automatically once v2.0.2 is tagged.
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
            BASE_VERSION="${BASE_TAG#v}"
            if [ -z "${BASE_VERSION}" ]; then
              BASE_VERSION="0.0.0"
            fi

            MAJ="${BASE_VERSION%%.*}"
            REST="${BASE_VERSION#*.}"
            MIN="${REST%%.*}"
            PAT="${REST#*.}"
            PAT="${PAT%%.*}"
            [ -n "${PAT}" ] || PAT=0
            NEXT_VERSION="${MAJ}.${MIN}.$((PAT + 1))"

            VERSION="${NEXT_VERSION}-beta.${{ github.run_number }}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "Resolved version for PR beta build: ${VERSION}"
            exit 0
          fi

          # 4) Fallback for branch manual runs without input
          VERSION="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          VERSION="${VERSION#v}"
          if [ -z "${VERSION}" ]; then
            echo "Could not resolve a version (no tags found)."
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version from latest tag fallback: ${VERSION}"

      - name: Resolve RPM release digit
        id: resolve_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.resolve_version.outputs.version }}
        run: |
          set -euo pipefail

          # Beta/prerelease builds (version contains a '-') own their release
          # digit via build-rpm.sh (0.beta.<n>) and ignore APP_RELEASE, so the
          # value here is irrelevant for them. Emit 1 and stop.
          if [[ "${VERSION}" == *-* ]]; then
            echo "release=1" >> "$GITHUB_OUTPUT"
            echo "Prerelease build; release digit handled by build-rpm.sh."
            exit 0
          fi

          # Final build: a repackage of the SAME version must be a strictly-newer
          # NVR so dnf upgrades. Look at the RPMs already published for this exact
          # version across all releases, take the highest Release digit, add one.
          # First build of a version -> 1; each rebuild -> 2, 3, ...
          VRE="${VERSION//./\\.}"
          resp="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/releases?per_page=100" || true)"

          max="$(printf '%s' "${resp}" \
            | grep -oE "almalinux-creative-installer-${VRE}-[0-9]+\.el[0-9]+\.noarch\.rpm" \
            | sed -E "s/.*-${VRE}-([0-9]+)\.el[0-9]+\.noarch\.rpm/\1/" \
            | sort -n | tail -n1 || true)"

          if [[ -z "${max}" ]]; then
            release=1
          else
            release=$((max + 1))
          fi
          echo "release=${release}" >> "$GITHUB_OUTPUT"
          echo "Resolved RPM release digit for ${VERSION}: ${release}"

      - name: Build RPM
        env:
          TOPDIR: ${{ github.workspace }}/rpmbuild
          DISTDIR: ${{ github.workspace }}/dist
          VERSION: ${{ steps.resolve_version.outputs.version }}
          # Final (non-beta) builds set the RPM Release to one more than the
          # highest digit already published for this version (see the
          # "Resolve RPM release digit" step), so a repackage of the same
          # version (2.0.2-1 -> 2.0.2-2 -> ...) upgrades cleanly. Beta builds
          # ignore this and keep their 0.beta.<n> release (build-rpm.sh).
          APP_RELEASE: ${{ steps.resolve_release.outputs.release }}
          GIT_DISCOVERY_ACROSS_FILESYSTEM: 1
        run: |
          mkdir -p "$TOPDIR" "$DISTDIR"
          export HOME="${{ github.workspace }}"
          mkdir -p "$HOME"/rpmbuild
          
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          chmod +x src/packaging/build-rpm.sh
          ./src/packaging/build-rpm.sh

          find "$HOME/rpmbuild/RPMS" -type f -name "*.rpm" -exec cp -v {} "$DISTDIR/" \;
          mkdir -p "$DISTDIR/srpms"
          find "$HOME/rpmbuild/SRPMS" -type f -name "*.src.rpm" -exec cp -v {} "$DISTDIR/srpms/" \;

      - name: Smoke test — install RPM and verify files
        env:
          DISTDIR: ${{ github.workspace }}/dist
        run: |
          dnf install -y "$DISTDIR"/*.rpm
          test -x /usr/bin/almalinux-creative-installer              || { echo "FAIL: binary missing"; exit 1; }
          test -x /usr/libexec/almalinux-creative-installer-helper   || { echo "FAIL: helper missing"; exit 1; }
          test -f /usr/share/almalinux-creative-installer/qtcompat.py || { echo "FAIL: qtcompat missing"; exit 1; }
          test -f /usr/share/applications/almalinux-creative-installer.desktop || { echo "FAIL: .desktop missing"; exit 1; }
          echo "Smoke test passed on EL${{ matrix.el }}."

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rpm-el${{ matrix.el }}-${{ github.event_name == 'pull_request' && format('pr{0}', github.event.pull_request.number) || 'release' }}
          path: dist/*.rpm

      - name: Upload SRPM artifact
        if: matrix.el == 9 && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: srpm-pr${{ github.event.pull_request.number }}
          path: dist/srpms/*.src.rpm

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source (for tag fallback)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        run: |
          TAG=""
          if [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            git config --global --add safe.directory "$GITHUB_WORKSPACE"
            TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)"
          fi

          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"
          if [ -n "${TAG}" ]; then
            echo "do_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "do_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download EL9 artifacts
        if: steps.resolve_tag.outputs.do_release == 'true'
        uses: actions/download-artifact@v8
        with:
          name: rpm-el9-release
          path: dist

      - name: Download EL10 artifacts
        if: steps.resolve_tag.outputs.do_release == 'true'
        uses: actions/download-artifact@v8
        with:
          name: rpm-el10-release
          path: dist

      - name: Create GitHub Release
        if: steps.resolve_tag.outputs.do_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          files: dist/*.rpm
          draft: true
          prerelease: ${{ contains(steps.resolve_tag.outputs.tag_name, '-rc') || contains(steps.resolve_tag.outputs.tag_name, '-beta') || contains(steps.resolve_tag.outputs.tag_name, '-alpha') }}
          generate_release_notes: false
          body: |
            ## :tada: AlmaLinux Creative Installer ${{ steps.resolve_tag.outputs.tag_name }}

            ### Highlights
            - (fill me in)

            ### Assets
            - EL9 RPM (Qt5 / PyQt5)
            - EL10 RPM (Qt6 / PyQt6)

  copr-beta:
    name: Submit to COPR testing
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'documentation')

    steps:
      - name: Download SRPM
        uses: actions/download-artifact@v8
        with:
          name: srpm-pr${{ github.event.pull_request.number }}
          path: dist

      - name: Install copr-cli
        run: pip install copr-cli

      - name: Configure copr-cli
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
        run: |
          mkdir -p ~/.config
          cat > ~/.config/copr <<EOF
          [copr-cli]
          login          = ${COPR_LOGIN}
          username       = tristantheroux
          token          = ${COPR_TOKEN}
          copr_url       = https://copr.fedorainfracloud.org
          EOF

      - name: Submit SRPM to COPR testing
        run: |
          copr-cli build --nowait \
            tristantheroux/AlmaLinux-Creative-Installer-Testing \
            dist/*.src.rpm

  pr-beta-comment:
    name: Comment beta RPM location on PR
    needs: [build, copr-beta]
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'documentation') && needs.build.result == 'success'

    steps:
      - name: Post new comment with beta RPM download link
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          header: beta-rpm
          recreate: true
          message: |
            ✅ Beta RPMs are ready for commit `${{ github.sha }}`.

            ## Option 1: COPR testing repo (recommended, installs via DNF)

            Enable the **testing** repo, then install. Works on both AlmaLinux 9
            and AlmaLinux 10 (DNF auto-detects the right epel-9 / epel-10 build).

            ```bash
            sudo dnf copr enable tristantheroux/AlmaLinux-Creative-Installer-Testing
            sudo dnf install almalinux-creative-installer
            ```

            > The COPR build runs asynchronously. Wait ~5 min after this comment before installing.

            ### Uninstall after QA
            ```bash
            sudo dnf remove almalinux-creative-installer
            sudo dnf copr remove tristantheroux/AlmaLinux-Creative-Installer-Testing
            ```

            ## Option 2: Manual RPM download

            Download from this run's artifacts:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts

            Artifact names:
            - `rpm-el9-pr${{ github.event.pull_request.number }}`
            - `rpm-el10-pr${{ github.event.pull_request.number }}`
